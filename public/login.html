<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - 业余球队管理系统</title>
    <link rel="stylesheet" href="/assets/app.css?v=20260130-1" />
    <!-- 登录页背景：梅西图片 + 遮罩保证表单可读 -->
    <style>
      :root {
        --green: #22c55e;
        --green-dim: rgba(34,197,94,.15);
        --white: rgba(255,255,255,.92);
        --muted: rgba(255,255,255,.45);
        --card: rgba(255,255,255,.05);
        --border: rgba(255,255,255,.10);
        --font: 'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font);
        color: var(--white);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem 1.25rem 2.5rem;
        box-sizing: border-box;
        background:
              radial-gradient(700px 450px at 50% 15%, rgba(34,197,94,.10), transparent 60%),
              linear-gradient(180deg, #050a0f 0%, #071020 100%);
      }
      .login-box {
        background: var(--card);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 1.5rem;
        box-shadow: 0 20px 48px rgba(0,0,0,.35);
      }
      /* 输入框透明，覆盖全局样式和浏览器自动填充白底 */
      .login-box input[type="text"],
      .login-box input[type="password"],
      .login-box .input {
        width: 100%;
        border-radius: 12px;
        background: rgba(255,255,255,.06) !important;
        -webkit-box-shadow: 0 0 0 1000px rgba(10,16,30,.7) inset !important;
        box-shadow: 0 0 0 1000px rgba(10,16,30,.7) inset !important;
        border: 1px solid var(--border);
        padding: 12px 16px;
        color: var(--white) !important;
      }
      .login-box input::placeholder { color: var(--muted); }
      .login-box input:focus {
        outline: none;
        border-color: rgba(34,197,94,.5);
        -webkit-box-shadow: 0 0 0 1000px rgba(10,16,30,.8) inset !important;
        box-shadow: 0 0 0 1000px rgba(10,16,30,.8) inset !important;
      }
      /* 覆盖浏览器自动填充（黄/白底）为透明深色 */
      .login-box input:-webkit-autofill,
      .login-box input:-webkit-autofill:hover,
      .login-box input:-webkit-autofill:focus,
      .login-box input:-webkit-autofill:active {
        -webkit-text-fill-color: var(--white) !important;
        -webkit-box-shadow: 0 0 0 1000px rgba(10,16,30,.7) inset !important;
        box-shadow: 0 0 0 1000px rgba(10,16,30,.7) inset !important;
        transition: background-color 5000s ease-in-out 0s;
      }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-10 text-slate-100 safe-bottom">
    <a href="/register.html" class="top-nav-login" aria-label="注册">注册</a>
    <div class="w-full max-w-md">
        <div class="text-center mb-4">
          <h1 style="font-size:2rem;font-weight:900;letter-spacing:-.03em;background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,.7) 50%,#22c55e 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">FootballGo</h1>
          <p style="color:rgba(255,255,255,.45);font-size:.85rem;margin-top:.3rem;">业余足球队管理系统</p>
        </div>
        <div class="login-box">

            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-xs mb-2 font-medium text-white/70">账号</label>
                    <input
                        type="text"
                        id="usernameOrEmail"
                        name="usernameOrEmail"
                        required
                        class="input"
                        placeholder="请输入账号（任意用户名）"
                        autocomplete="username"
                    />
                </div>

                <div>
                    <label class="block text-xs mb-2 font-medium text-white/70">密码</label>
                    <div class="relative">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                            class="input pr-12"
                            placeholder="密码"
                            autocomplete="current-password"
                        />
                        <button id="togglePwd" type="button" class="absolute inset-y-0 right-2 my-2 px-3 rounded-lg border border-white/15 bg-black/20 text-white/80 text-xs">
                            显示
                        </button>
                    </div>
                </div>

                <div class="text-xs text-white/40">忘记密码请联系管理员</div>

                <div id="errorMessage"
                     class="hidden bg-red-500/15 border border-red-500/60 text-red-100 text-xs rounded-xl px-3 py-2"></div>

                <button id="btnLogin" type="submit" class="btn btn-primary w-full py-3">
                    登录
                </button>
            </form>

            <div class="mt-5 text-center text-xs text-white/60">
                <span>还没有账号？</span>
                <a href="/register.html" class="underline underline-offset-4 hover:text-white">立即注册</a>
            </div>
            <div class="mt-3 text-center">
                <a href="/showcase.html" class="text-white/50 hover:text-white/70 text-xs">返回首页</a>
            </div>
            <div class="mt-3 text-center text-white/35 text-[10px] leading-snug">
                <!-- 背景图来自免署名图库（Pexels 许可证），无需在页面内展示署名 -->
            </div>
        </div>
    </div>

    <script>
        // password toggle
        (function () {
            const btn = document.getElementById('togglePwd');
            const input = document.getElementById('password');
            if (!btn || !input) return;
            btn.addEventListener('click', () => {
                const isPwd = input.type === 'password';
                input.type = isPwd ? 'text' : 'password';
                btn.textContent = isPwd ? '隐藏' : '显示';
            });
        })();

        // 登录逻辑（mobile-first: disable button while submitting）
        (function () {
            var form = document.getElementById('loginForm');
            var errorDiv = document.getElementById('errorMessage');
            var btnLogin = document.getElementById('btnLogin');
            if (!form || !errorDiv || !btnLogin) return;

            // 通过 file:// 打开时无法请求接口，给出提示
            if (window.location.protocol === 'file:') {
                errorDiv.textContent = '请通过浏览器访问 http://localhost:3000/login.html 再登录（不要直接打开本地文件）';
                errorDiv.classList.remove('hidden');
            }

            form.addEventListener('submit', async function (e) {
                e.preventDefault();
                errorDiv.classList.add('hidden');

                var usernameOrEmail = document.getElementById('usernameOrEmail').value.trim();
                var password = document.getElementById('password').value;

                if (!usernameOrEmail || !password) {
                    errorDiv.textContent = '请输入账号和密码';
                    errorDiv.classList.remove('hidden');
                    return;
                }

                btnLogin.disabled = true;
                btnLogin.classList.add('opacity-60');
                btnLogin.textContent = '登录中...';

                var apiBase = window.location.origin;
                var controller = new AbortController();
                var timeoutId = setTimeout(function () { controller.abort(); }, 15000);

                var redirecting = false;
                try {
                    var response = await fetch(apiBase + '/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ usernameOrEmail: usernameOrEmail, password: password }),
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);

                    var result = {};
                    try {
                        var text = await response.text();
                        if (text) result = JSON.parse(text);
                    } catch (parseErr) {
                        console.warn('登录响应解析失败', parseErr);
                    }
                    if (response.ok) {
                        var token = result.accessToken || result.access_token;
                        try {
                            if (token) {
                            try { localStorage.setItem('authToken', token); } catch (e) {}
                            try { sessionStorage.setItem('authToken', token); } catch (e) {}
                        }
                            if (result.user) localStorage.setItem('user', JSON.stringify(result.user));
                        } catch (storageErr) {
                            console.warn('localStorage 写入失败', storageErr);
                        }
                        var role = result.user && result.user.role;
                        var goUrl = apiBase + (role === 'admin' ? '/admin-dashboard.html' : '/dashboard.html');
                        console.log('登录成功，即将跳转到', goUrl);
                        redirecting = true;
                        btnLogin.textContent = '登录成功，正在跳转…';
                        setTimeout(function () {
                            window.location.replace(goUrl);
                        }, 200);
                        return;
                    }
                    var errMsg = result.message || result.error || '';
                    if (response.status >= 500) errMsg = '服务器错误，请稍后重试或联系管理员';
                    else if (!errMsg) errMsg = '登录失败（' + response.status + '）';
                    errorDiv.textContent = errMsg;
                    errorDiv.classList.remove('hidden');
                } catch (err) {
                    clearTimeout(timeoutId);
                    if (err && err.name === 'AbortError') {
                        errorDiv.textContent = '请求超时，请检查网络或稍后重试';
                    } else {
                        errorDiv.textContent = '网络错误，请确认服务已启动（npm run start）并访问 http://localhost:3000/login.html';
                    }
                    errorDiv.classList.remove('hidden');
                    console.error('登录请求失败', err);
                } finally {
                    if (!redirecting) {
                        btnLogin.disabled = false;
                        btnLogin.classList.remove('opacity-60');
                        btnLogin.textContent = '登录';
                    }
                }
            });
        })();
    </script>
</body>
</html>
