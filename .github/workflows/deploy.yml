name: 自动部署到阿里云 ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 部署到 ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 47.237.69.93
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /opt/test

            echo "📥 拉取最新代码..."
            git config --global --add safe.directory /opt/test
            git fetch origin main

            # 检测本次变更是否只有静态文件（public/ assets）
            CHANGED=$(git diff --name-only HEAD origin/main)
            ONLY_STATIC=true
            for f in $CHANGED; do
              case "$f" in
                public/*|*.md) ;;
                *) ONLY_STATIC=false; break ;;
              esac
            done

            git reset --hard origin/main

            if [ "$ONLY_STATIC" = "true" ]; then
              echo "⚡ 仅静态文件变更，跳过镜像重建，直接热更新..."
              CONTAINER=$(docker compose -f docker-compose.prod.yml ps -q api)
              if [ -n "$CONTAINER" ]; then
                docker cp public/. "$CONTAINER":/app/public/
                echo "✅ 静态文件已热更新，无需重启"
              else
                docker compose -f docker-compose.prod.yml up -d
              fi
            else
              echo "🔨 代码变更，重新构建镜像（使用缓存加速）..."
              DOCKER_BUILDKIT=1 docker compose -f docker-compose.prod.yml build api
              docker compose -f docker-compose.prod.yml up -d

              echo "🧹 清理旧镜像..."
              docker image prune -f
            fi

            echo "✅ 部署完成！"
            docker compose -f docker-compose.prod.yml ps
